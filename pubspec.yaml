name: bloomind
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.1
  table_calendar: ^3.1.2
  intl: ^0.19.0
  fl_chart: ^0.68.0
  file_picker: ^8.0.7
  path_provider: ^2.1.2
  url_launcher: ^6.3.1
  just_audio: ^0.10.5
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  permission_handler: ^12.0.1
  flutter_timezone: ^5.0.2
  shared_preferences: ^2.2.3
  android_intent_plus: ^5.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon_bloomind.png"

flutter:
  uses-material-design: true

  assets:
    - assets/audios/
    - assets/audios2/
    - assets/onboarding/
    - assets/logo/